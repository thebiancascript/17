<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite :) </title>
  <link rel="stylesheet" href="principal.css">
</head>
<body>

  <section class="hero">
    <h1>Raise Your Glass ✨</h1>
    <div id="countdown">00d 00h 00m 00s</div>
</section>

<section class="invite-section">
  <div class="invite-card">
    <img src="image/convite.png" alt="Convite do evento">
  </div>


  <p class="map-link">
    <a href="https://maps.app.goo.gl/8Y3uYGsKsVmHqZHS6" target="_blank">Ver no mapa: 📍</a>
  </p>
</section>

  <div class="button">
    <a href="confirmado.html">Confirm Attendance</a>
  </div>

  <footer>
    <strong>© Sol, 2026.</strong>
  </footer>

<script>
const countdownDate = new Date("2026-04-17T19:30:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const distance = countdownDate - now;

  if (distance < 0) {
    document.getElementById("countdown").innerHTML = "🎉 É hora de comemorar! 🎉";
    clearInterval(timer);
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

updateCountdown();
const timer = setInterval(updateCountdown, 1000);
</script>

</body>
</html>
